name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            api/package-lock.json
            cdk/package-lock.json
            frontend/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install & build API
        working-directory: api
        run: npm ci && npm run lint && npm run test && npm run build

      - name: Install & build frontend
        working-directory: frontend
        run: npm ci && npm run lint && npm run test && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
          VITE_IMAGES_BUCKET: ${{ secrets.VITE_IMAGES_BUCKET }}

      - name: Install CDK deps
        working-directory: cdk
        run: npm ci && npm run lint && npm run test && npm run build

      - name: CDK deploy
        working-directory: cdk
        # MossyWaveCdn excluded — CloudFront blocked on new AWS accounts
        run: npx cdk deploy MossyWaveNetworking MossyWaveStorage MossyWaveAuth MossyWaveRds MossyWaveCompute MossyWaveApi MossyWaveObservability --require-approval never --outputs-file ../cdk-outputs.json --context dbPassword=$DB_PASSWORD
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # Uncomment when CloudFront restriction lifts on the AWS account:
